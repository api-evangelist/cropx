aid: cropx
url: https://raw.githubusercontent.com/api-evangelist/cropx/refs/heads/main/apis.yml
name: CropX
kind: company
description: >-
  CropX is an Israeli ag-IoT company that combines in-field soil and weather
  hardware with a cloud Farm Management Software (FMS) platform. The hardware
  portfolio includes SV-series soil sensors (moisture, temperature,
  conductivity, salinity at depth), ET-series evapotranspiration sensors,
  WS-series weather stations, RG rain gauges, the Apex root-zone sensor, an
  in-development nitrate sensor, and TD-series cellular telemetry gateways.
  The FMS covers farm / field / crop data, device management, irrigation
  scheduling, disease monitoring, nutrition, effluent, and reporting. CropX
  does not publish a public developer portal; integrations with third-party
  sensors and machinery are arranged through their team.
